services:
  lantu-epay-protocol-adapter:
    image: ghcr.io/nkbaa/lantu-epay-protocol-adapter:latest
    container_name: lantu-epay-protocol-adapter
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "18080"
      PUBLIC_BASE_URL: "https://pay-adapter.example.com"
      LANTU_API_BASE: "https://api.ltzf.cn"
      LANTU_KEY: "change_me_lantu_key"
